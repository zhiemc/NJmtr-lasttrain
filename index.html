<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>南京地铁 末班方案查询</title>
    <!-- 引入Font Awesome图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #f4f5f7;
            --card: rgba(255, 255, 255, 0.92);
            --text: #111111;
            --subtext: #666666;
            --muted: #8a8a8a;
            --border: #e6e7ea;
            --shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
            --radius: 16px;
            --radius-lg: 20px;
            --ease: cubic-bezier(0.2, 0, 0.2, 1);
            --dur: 300ms;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "HarmonyOS Sans", "HarmonyOS Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
        }
        .app {
            width: 100%;
            max-width: 420px;
            min-height: 100vh;
            padding: 32px 18px 24px;
            position: relative;
        }
        .view {
            transition: opacity var(--dur) var(--ease), transform var(--dur) var(--ease);
        }
        .view.hidden {
            opacity: 0;
            transform: translateY(10px);
            pointer-events: none;
            position: absolute;
            inset: 0;
        }
        .home-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            padding-top: 80px;
        }
        .home-icon {
            width: 72px;
            height: 72px;
            border-radius: 36px;
            background: linear-gradient(180deg, #ffffff 0%, #f2f4f7 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow);
        }
        .home-icon i {
            font-size: 34px;
            color: #111111;
        }
        .home-title {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .station-selector {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            transition: transform 400ms var(--ease), opacity 400ms var(--ease);
        }
        .station-btn {
            flex: 1;
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px 8px;
            text-align: center;
            font-size: 15px;
            font-weight: 600;
            color: #333333;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.05);
            transition: transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
            cursor: pointer;
            --ripple-color: rgba(10, 100, 201, 0.2);
        }
        .station-btn:active {
            transform: scale(0.98);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
        }
        .station-btn.small {
            font-size: 14px;
            padding: 10px 8px;
        }
        .arrow-icon {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #7a7a7a;
            border: none;
            background: transparent;
            border-radius: 999px;
            transition: transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
        }
        .arrow-icon i {
            font-size: 18px;
        }
        .swap-btn {
            border: 1px solid var(--border);
            background: #ffffff;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.05);
            cursor: pointer;
            color: #666666;
            --ripple-color: rgba(102, 102, 102, 0.2);
        }
        .swap-btn:active {
            transform: scale(0.96);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
        }
        .result-view {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .result-header {
            display: flex;
            align-items: center;
            gap: 10px;
            transition: transform 400ms var(--ease), opacity 400ms var(--ease);
        }
        .result-view.is-entering .result-header {
            transform: translateY(88px);
            opacity: 0.92;
        }
        .cards {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .plan-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 14px 14px 16px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(6px);
            transition: transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease), opacity 400ms var(--ease), filter 400ms var(--ease);
            opacity: 1;
            filter: blur(0);
        }
        .plan-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
        }
        .plan-card.card-enter {
            transform: translateY(-36px);
            opacity: 0;
            filter: blur(16px);
            transition: transform 400ms var(--ease), opacity 400ms var(--ease), filter 400ms var(--ease);
        }
        .plan-card.card-enter.card-enter-active {
            transform: translateY(0);
            opacity: 1;
            filter: blur(0);
        }
        .plan-card.card-exit {
            transform: translateY(12px);
            opacity: 0;
            filter: blur(16px);
            transition: transform 400ms var(--ease), opacity 400ms var(--ease), filter 400ms var(--ease);
        }
        .plan-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
            font-variant-numeric: tabular-nums;
        }
        .plan-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
            font-weight: 700;
        }
        .plan-title i {
            font-size: 16px;
        }
        .card-metrics {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 10px;
            background: #f7f8fa;
            border-radius: 10px;
            margin-bottom: 10px;
            font-variant-numeric: tabular-nums;
        }
        .metric-duration {
            color: #0a64c9;
            font-weight: 700;
            font-size: 16px;
            white-space: nowrap;
            text-align: right;
        }
        .metric-arrive {
            color: #0a64c9;
            font-weight: 700;
            font-size: 16px;
            white-space: nowrap;
            text-align: left;
        }
        .path-visual {
            background: #f7f8fa;
            border-radius: 12px;
            padding: 8px 8px 10px;
            overflow: hidden;
        }
        .path-vertical-layout {
            display: grid;
            grid-template-columns: 18px 1fr;
            column-gap: 8px;
            align-items: start;
        }
        .path-line-column {
            position: relative;
        }
        .path-vertical-segment {
            position: absolute;
            left: 7px;
            width: 4px;
            background: var(--line-color);
            border-radius: 3px;
        }
        .path-row-list {
            display: flex;
            flex-direction: column;
        }
        .path-row {
            display: flex;
            align-items: center;
            gap: 7px;
            min-width: 0;
        }
        .path-station-name {
            font-size: 15px;
            font-weight: 700;
            color: #1f1f1f;
            line-height: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 120px;
            flex-shrink: 1;
        }
        .path-row.end .path-station-name {
            max-width: 100%;
        }
        .path-arrive-time {
            color: #0a64c9;
            font-weight: 700;
            font-size: 16px;
            white-space: nowrap;
            text-align: left;
            flex-shrink: 0;
        }
        .path-line-tag {
            background: var(--line-color);
            color: #ffffff;
            font-size: 10px;
            font-weight: 700;
            line-height: 1;
            padding: 3px 7px;
            border-radius: 6px;
            flex-shrink: 0;
        }
        .path-direction {
            font-size: 13px;
            color: #444444;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            min-width: 0;
        }
        .last-panel {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-top: 10px;
            background: #f7f8fa;
            border-radius: 12px;
            padding: 10px 12px;
            border: 1px solid #e6e7ea;
        }
        .last-panel-label {
            font-size: 15px;
            font-weight: 700;
            color: #111111;
            white-space: nowrap;
        }
        .last-panel-values {
            flex: 1;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 24px;
            min-width: 0;
        }
        .last-slot {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .last-slot-label {
            font-size: 13px;
            color: #222222;
            line-height: 1.2;
            margin-bottom: 4px;
        }
        .last-slot-value {
            font-size: 20px;
            font-weight: 800;
            color: #0a64c9;
            line-height: 1;
            letter-spacing: 0.3px;
        }
        .last-panel.single .last-panel-values {
            gap: 0;
        }
        .last-panel + .path-visual {
            margin-top: 12px;
        }
        .notes-fixed {
            width: 100%;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 12px;
            font-size: 11px;
            color: #777777;
            line-height: 1.6;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.06);
            backdrop-filter: blur(6px);
            margin-top: 4px;
        }
        [data-ripple="true"] {
            position: relative;
            overflow: hidden;
            isolation: isolate;
        }
        .ripple-wave {
            position: absolute;
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            pointer-events: none;
            animation: ripple-wave 620ms var(--ease) forwards;
            z-index: 1;
        }
        @keyframes ripple-wave {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0.45;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0;
            }
        }
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            opacity: 0;
            visibility: hidden;
            transition: opacity var(--dur) var(--ease);
            z-index: 50;
        }
        .overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .station-picker {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            height: 72vh;
            background: var(--card);
            border-radius: 20px 20px 0 0;
            border: 1px solid var(--border);
            box-shadow: 0 -10px 24px rgba(0, 0, 0, 0.12);
            transform: translateY(100%);
            transition: transform var(--dur) var(--ease);
            z-index: 60;
            display: flex;
            flex-direction: column;
        }
        .station-picker.active {
            transform: translateY(0);
        }
        .picker-top {
            padding: 14px 16px 10px;
            border-bottom: 1px solid var(--border);
        }
        .search-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f7f8fa;
            border: 1px solid #e6e7ea;
            border-radius: 12px;
            padding: 8px 10px;
        }
        .search-box i {
            color: #999999;
        }
        .search-input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            font-size: 14px;
        }
        .clear-btn {
            border: none;
            background: transparent;
            color: #999999;
            font-size: 16px;
            cursor: pointer;
        }
        .picker-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .line-list {
            width: 38%;
            background: #f6f7fa;
            overflow-y: auto;
            padding: 8px 6px;
            border-right: 1px solid var(--border);
        }
        .line-item {
            padding: 12px 10px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 8px;
            cursor: pointer;
            transition: transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
        }
        .line-item.active {
            transform: scale(1.02);
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.12);
        }
        .station-list {
            width: 62%;
            overflow-y: auto;
        }
        .station-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 12px 14px;
            border-bottom: 1px solid #f0f1f4;
            font-size: 14px;
            color: #333333;
            cursor: pointer;
            transition: background var(--dur) var(--ease);
        }
        .station-item:hover {
            background: #f5f7fb;
        }
        .station-meta {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-left: auto;
        }
        .transfer-tag {
            display: inline-block;
            color: #ffffff;
            font-size: 10px;
            font-weight: 700;
            padding: 1px 5px;
            border-radius: 4px;
        }
        .line-badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 700;
            color: #ffffff;
            padding: 1px 5px;
            border-radius: 4px;
        }
        .station-item i {
            color: #666666;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="view home-view" id="homeView">
            <div class="home-icon"><i class="fa-regular fa-clock"></i></div>
            <div class="home-title">南京地铁 末班方案查询</div>
            <div class="station-selector">
                <button class="station-btn" id="homeStartBtn" data-ripple="true">请选择起点站</button>
                <button class="arrow-icon swap-btn" id="homeSwapBtn" type="button" aria-label="互换起终点" data-ripple="true"><i class="fa-solid fa-caret-right"></i></button>
                <button class="station-btn" id="homeEndBtn" data-ripple="true">请选择终点站</button>
            </div>
        </div>
        <div class="view result-view hidden" id="resultView">
            <div class="result-header">
                <button class="station-btn small" id="resultStartBtn" data-ripple="true">请选择起点站</button>
                <button class="arrow-icon swap-btn" id="resultSwapBtn" type="button" aria-label="互换起终点" data-ripple="true"><i class="fa-solid fa-caret-right"></i></button>
                <button class="station-btn small" id="resultEndBtn" data-ripple="true">请选择终点站</button>
            </div>
            <div class="cards" id="resultCards"></div>
            <div class="notes-fixed" id="notes">
                <div>1、由时刻表计算生成，换乘时含候车时间默认共6分钟。</div>
                <div>2、末班车开出前5分钟停止入闸。</div>
                <div>3、实际运营情况可能存在出入，请提前候车！</div>
            </div>
        </div>
    </div>
    <div class="overlay" id="overlay"></div>
    <div class="station-picker" id="picker">

        </div>
        <div class="picker-body">
            <div class="line-list" id="lineList"></div>
            <div class="station-list" id="stationList"></div>
        </div>
    </div>

        // ===================== 3. 辅助工具函数 =====================

        function timeToMinutes(timeStr) {
            if (!timeStr) return null;
            const [hours, minutes] = timeStr.split(':').map(Number);
            const isNextDay = hours < 4 || (hours === 4 && minutes === 0);
            return hours * 60 + minutes + (isNextDay ? 1440 : 0); // 0-4点算次日，加1440分钟
        }

        // 分钟数转时间字符串
        function minutesToTime(minutes) {

            const totalMinutes = minutes % 1440;
            const hours = String(Math.floor(totalMinutes / 60)).padStart(2, '0');

        // 获取两个站点之间的区间时长总和
        function getSegmentDuration(lineName, startStation, endStation) {

            if (!line) return 0;
            const stations = line.stations;
            const startIdx = stations.findIndex(s => s.name === startStation);
            const endIdx = stations.findIndex(s => s.name === endStation);
            if (startIdx === -1 || endIdx === -1) return 0;

            let duration = 0;
            if (startIdx === endIdx) return 0;
            if (startIdx < endIdx) {
                // 下行，累加区间时长
                for (let i = startIdx + 1; i <= endIdx; i++) {
                    duration += stations[i].duration || 0;
                }
            } else {
                // 上行，累加区间时长
                for (let i = startIdx; i > endIdx; i--) {
                    duration += stations[i].duration || 0;
                }
            }
            return duration;
        }

            const endIdx = stations.indexOf(endStation);

            if (startIdx === endIdx) return null;
            return startIdx < endIdx ? 'down' : 'up';

            const metroFirst = metroStations[0];
            const metroLast = metroStations[metroStations.length - 1];
            const ttFirst = timetableStations[0];
            const ttLast = timetableStations[timetableStations.length - 1];

            const sameOrder = metroFirst === ttFirst && metroLast === ttLast;
            const reverseOrder = metroFirst === ttLast && metroLast === ttFirst;

            if (!reverseOrder || sameOrder) return direction;

                    const newDistance = distances[currentNode] + neighbor.weight;
                    if (newDistance < distances[neighborNode]) {
                        distances[neighborNode] = newDistance;
                        previous[neighborNode] = { node: currentNode, meta: neighbor };
                    }
                });
            }

            // 回溯路径
            const path = [];
            let current = endNode;
            while (previous[current]) {
                path.unshift(previous[current]);
                current = previous[current].node;
            }

            return {
                distance: distances[endNode],
                path,
                startNode,
                endNode
            };
        }

        // 解析路径为可读格式（修复同线路重复换乘BUG）
        function parsePath(result) {
            if (result.distance === Infinity) return null;
            const nodes = [result.startNode];
            result.path.forEach(step => nodes.push(step.meta.node));
            if (nodes.length < 2) return null;

            const pathSegments = [];
            let currentLine = nodes[0].split('_')[1];
            let currentStart = nodes[0].split('_')[0];
            let lastStation = currentStart;

            for (let i = 1; i < nodes.length; i++) {
                const [station, line] = nodes[i].split('_');
                if (line === currentLine) {
                    lastStation = station;
                } else {
                    // 线路切换：仅在当前线路有实际行驶时才落段
                    if (lastStation !== currentStart) {
                        pathSegments.push({ line: currentLine, start: currentStart, end: lastStation });
                    }
                    currentLine = line;
                    currentStart = station;
                    lastStation = station;
                }
            }

            if (lastStation !== currentStart) {
                pathSegments.push({ line: currentLine, start: currentStart, end: lastStation });
            }

            if (pathSegments.length === 0) return null;
            const transferStations = pathSegments.slice(0, -1).map(seg => seg.end);
            const transferCount = transferStations.length;
            const rideDuration = pathSegments.reduce((sum, seg) => {
                return sum + getSegmentDuration(seg.line, seg.start, seg.end);
            }, 0);

            return {
                totalTime: rideDuration + transferCount * TRANSFER_TIME,
                segments: pathSegments,
                transferCount,
                transferStations
            };
        }

        // 计算起点到终点的最优路径
        function calcOptimalPath(startStation, endStation, planType) {
            if (!stationLineMap[startStation] || !stationLineMap[endStation]) return null;
            const startLines = stationLineMap[startStation];
            const endLines = stationLineMap[endStation];
            const pathMap = new Map();

            // 遍历所有起终点线路组合
            startLines.forEach(startLine => {
                endLines.forEach(endLine => {
                    const startNode = `${startStation}_${startLine}`;
                    const endNode = `${endStation}_${endLine}`;
                    const result = dijkstra(startNode, endNode);
                    
                    if (result.distance === Infinity) return;
                    const parsed = parsePath(result);
                    if (!parsed) return;
                    const key = parsed.segments.map(seg => `${seg.line}:${seg.start}>${seg.end}`).join('|');
                    if (!pathMap.has(key)) {
                        pathMap.set(key, parsed);
                    }
                });
            });

            const allResults = Array.from(pathMap.values());
            if (allResults.length === 0) return null;

            // 按规划类型排序
            if (planType === 'time') {
                // 时间最快：总耗时最少>换乘次数最少
                allResults.sort((a, b) => {
                    if (a.totalTime !== b.totalTime) return a.totalTime - b.totalTime;
                    return a.transferCount - b.transferCount;
                });
                return allResults[0];
            } else if (planType === 'last') {
                // 末班模式返回所有可行路径
                return allResults;
            }
            return null;
        }

        // ===================== 5. 末班最晚核心逆推算法 =====================
        // 计算单条路径的最晚起点发车时间（支持大交路+小交路）
        function calcPathLastTime(path, dayType) {
            const segments = path && path.segments ? path.segments : [];
            if (segments.length === 0) return null;
            let latestArrivalLimit = Infinity;

            // 从最后一段开始逆推
            for (let i = segments.length - 1; i >= 0; i--) {
                const seg = segments[i];
                const direction = getDirection(seg.line, seg.start, seg.end);
                if (!direction) return null;

                // 末段：按末班可行交路取最晚可发车时刻
                if (i === segments.length - 1) {
                    const option = getSegmentLatestOption(
                        seg.line,
                        seg.start,
                        seg.end,
                        direction,
                        dayType,
                        latestArrivalLimit
                    );
                    if (!option) return null;

                    if (i === 0) {
                        return option.startTime;
                    }
                    latestArrivalLimit = option.startTime - TRANSFER_TIME;
                    continue;
                }

                // 前序段：按后序换乘时限反推发车时间，超出起点末班则强制取起点末班
                const segmentDuration = getSegmentDuration(seg.line, seg.start, seg.end);
                if (segmentDuration <= 0) return null;

                const requiredArrival = latestArrivalLimit;
                const computedStart = requiredArrival - segmentDuration;
                const startCap = getSegmentStartCap(seg.line, seg.start, seg.end, direction, dayType);
                if (startCap === null) return null;

                const actualStart = Math.min(computedStart, startCap);
                if (i === 0) {
                    return actualStart;
                }
                latestArrivalLimit = actualStart - TRANSFER_TIME;
            }
            return null;
        }

        // 计算末班最晚最终结果
        function calcLastTrainResult(startStation, endStation, allPaths) {
            const dayTypes = [
                { key: 'weekday', label: '周日至周四' },
                { key: 'weekend', label: '周五至周六' }
            ];
            const results = {};

            // 分别计算两种工作日类型
            dayTypes.forEach(dayType => {
                let maxTime = -Infinity;
                allPaths.forEach(path => {
                    const pathTime = calcPathLastTime(path, dayType.key);
                    if (pathTime !== null && pathTime > maxTime) {
                        maxTime = pathTime;
                    }
                });
                results[dayType.key] = maxTime === -Infinity ? null : maxTime;
            });

            // 格式化展示结果
            const weekdayTime = results.weekday;
            const weekendTime = results.weekend;
            let displayResult = [];

            if (weekdayTime === null && weekendTime === null) {
                displayResult.push({ label: '全周', value: '无可用末班路径' });
            } else if (weekdayTime !== null && weekendTime !== null && weekdayTime === weekendTime) {
                displayResult.push({ label: '全周', value: minutesToTime(weekdayTime) });
            } else {
                displayResult.push({
                    label: '周日至周四',
                    value: weekdayTime !== null ? minutesToTime(weekdayTime) : '无可用末班路径'
                });
                displayResult.push({
                    label: '周五至周六',
                    value: weekendTime !== null ? minutesToTime(weekendTime) : '无可用末班路径'
                });
            }
            return displayResult;
        }

        // ===================== 6. 页面渲染与结果展示 =====================
        const PINYIN_BOUNDARY = '啊芭擦搭蛾发噶哈机喀拉妈拿哦啪期然撒塌挖昔压匝';
        const PINYIN_LETTERS = 'ABCDEFGHJKLMNOPQRSTWXYZ';

        function normalizeTransferLines() {
            const stationMap = {};
            metroData.forEach(line => {
                line.stations.forEach(station => {
                    if (!stationMap[station.name]) stationMap[station.name] = [];
                    if (!stationMap[station.name].includes(line.lineName)) {
                        stationMap[station.name].push(line.lineName);
                    }
                });
            });
            metroData.forEach(line => {
                line.stations.forEach(station => {
                    if (!station.transferLines) station.transferLines = [];
                    stationMap[station.name].forEach(otherLine => {
                        if (otherLine !== line.lineName && !station.transferLines.includes(otherLine)) {
                            station.transferLines.push(otherLine);
                        }
                    });
                });
            });
        }

        function getPinyinInitial(char) {
            if (/^[a-z0-9]$/i.test(char)) return char.toUpperCase();
            if (!/[一-龥]/.test(char)) return '';
            for (let i = 0; i < PINYIN_BOUNDARY.length; i++) {
                const startChar = PINYIN_BOUNDARY[i];
                const endChar = PINYIN_BOUNDARY[i + 1];
                if (!endChar) return PINYIN_LETTERS[i] || '';
                if (char.localeCompare(startChar, 'zh') >= 0 && char.localeCompare(endChar, 'zh') < 0) {
                    return PINYIN_LETTERS[i] || '';
                }
            }
            return '';
        }

        function getPinyinInitials(text) {
            return Array.from(text).map(getPinyinInitial).join('').toLowerCase();
        }

        function matchesSearch(name, keyword) {
            if (!keyword) return true;
            const query = keyword.toLowerCase();
            if (name.toLowerCase().includes(query)) return true;
            return getPinyinInitials(name).includes(query);
        }

        function formatDuration(totalMinutes) {
            const hours = Math.floor(totalMinutes / 60);
            const minutes = totalMinutes % 60;
            if (hours > 0) return `${hours}小时${minutes}分钟`;
            return `${minutes}分钟`;
        }

        function formatClock(dateObj) {
            const hours = String(dateObj.getHours()).padStart(2, '0');
            const minutes = String(dateObj.getMinutes()).padStart(2, '0');
            const seconds = String(dateObj.getSeconds()).padStart(2, '0');
            return `${hours}:${minutes}:${seconds}`;
        }

        function formatClockMinute(dateObj) {
            const hours = String(dateObj.getHours()).padStart(2, '0');
            const minutes = String(dateObj.getMinutes()).padStart(2, '0');
            return `${hours}:${minutes}`;
        }

        function getLineShort(lineName) {
            return lineName.replace('号线', '');
        }

        function getLineTagTextColor(lineName) {
            return lineName === '5号线' || lineName === 'S9号线' ? '#333333' : '#ffffff';
        }

        function getStationIndex(lineName, stationName) {
            const stations = getLineStations(lineName);
            return stations.indexOf(stationName);
        }

        function getSegmentStationCount(lineName, startStation, endStation) {
            const startIdx = getStationIndex(lineName, startStation);
            const endIdx = getStationIndex(lineName, endStation);
            if (startIdx === -1 || endIdx === -1) return 0;
            return Math.abs(endIdx - startIdx);
        }

        function getDirectionLabel(lineName, startStation, endStation) {
            const stations = getLineStations(lineName);
            const direction = getDirection(lineName, startStation, endStation);
            if (!direction || stations.length === 0) return '';
            const terminal = direction === 'down' ? stations[stations.length - 1] : stations[0];
            return `${terminal}方向`;
        }

        function escapeHtml(raw) {
            return String(raw)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function buildPathVisual(path, options = {}) {
            const { showArrival = true } = options;
            if (!path || !path.segments || path.segments.length === 0) return '';

            const rowHeight = 42;
            const rows = [];
            path.segments.forEach((seg, index) => {
                rows.push({
                    type: index === 0 ? 'start' : 'transfer',
                    station: seg.start,
                    line: seg.line,
                    color: lineColorMap[seg.line] || '#999999',
                    direction: getDirectionLabel(seg.line, seg.start, seg.end)
                });
            });
            rows.push({
                type: 'end',
                station: path.segments[path.segments.length - 1].end
            });

            const totalHeight = rows.length * rowHeight;
            const segmentTopStart = rowHeight / 2;

            const segmentsHtml = path.segments.map((seg, index) => {
                const segColor = lineColorMap[seg.line] || '#999999';
                const top = segmentTopStart + index * rowHeight;
                return `
                    <div class="path-vertical-segment" style="top:${top}px;height:${rowHeight}px;--line-color:${segColor};"></div>
                `;
            }).join('');

            const rowHtml = rows.map(row => {
                if (row.type === 'end') {
                    const arriveHtml = showArrival
                        ? `<span class="path-arrive-time" data-duration="${path.totalTime}">--:--到达</span>`
                        : '';
                    return `
                        <div class="path-row end" style="height:${rowHeight}px;">
                            <span class="path-station-name">${escapeHtml(row.station)}</span>
                            ${arriveHtml}
                        </div>
                    `;
                }

                return `
                    <div class="path-row ${row.type}" style="height:${rowHeight}px;">
                        <span class="path-station-name">${escapeHtml(row.station)}</span>
                        <span class="path-line-tag" style="--line-color:${row.color};color:${getLineTagTextColor(row.line)};">${escapeHtml(getLineShort(row.line))}</span>
                        <span class="path-direction">${escapeHtml(row.direction)}</span>
                    </div>
                `;
            }).join('');

            return `
                <div class="path-visual">
                    <div class="path-vertical-layout">
                        <div class="path-line-column" style="height:${totalHeight}px;">
                            ${segmentsHtml}
                        </div>
                        <div class="path-row-list" style="height:${totalHeight}px;">
                            ${rowHtml}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderLines() {
            lineList.innerHTML = '';
            metroData.forEach(line => {
                const lineItem = document.createElement('div');
                lineItem.className = 'line-item';
                lineItem.textContent = line.lineName;
                lineItem.style.backgroundColor = line.lineColor;
                lineItem.setAttribute('data-ripple', 'true');
                if (line.lineCode === '5号线' || line.lineCode === 'S9号线') {
                    lineItem.style.color = '#333';
                }
                if (line.lineCode === currentActiveLine.lineCode) {
                    lineItem.classList.add('active');
                }
                lineItem.onclick = () => {
                    currentActiveLine = line;
                    renderLines();
                    renderStations();
                };
                lineList.appendChild(lineItem);
            });
        }

        function renderStations() {
            stationList.innerHTML = '';
            const keyword = stationSearch.value.trim().toLowerCase();
            const results = [];
            if (keyword) {
                metroData.forEach(line => {
                    line.stations.forEach(station => {
                        if (matchesSearch(station.name, keyword)) {
                            results.push({ line, station, isSearch: true });
                        }
                    });
                });
            } else {
                currentActiveLine.stations.forEach(station => {
                    results.push({ line: currentActiveLine, station, isSearch: false });
                });
            }

            const iconMap = {
                '南京站': 'fa-train',
                '南京南站': 'fa-train',
                '句容': 'fa-train',
                '禄口机场': 'fa-plane'
            };

            results.forEach(({ line, station, isSearch }) => {
                const stationItem = document.createElement('div');
                stationItem.className = 'station-item';
                stationItem.setAttribute('data-ripple', 'true');

                const nameSpan = document.createElement('span');
                nameSpan.textContent = station.name;
                stationItem.appendChild(nameSpan);

                if (iconMap[station.name]) {
                    const icon = document.createElement('i');
                    icon.className = `fas ${iconMap[station.name]}`;
                    stationItem.appendChild(icon);
                }

                const metaWrap = document.createElement('div');
                metaWrap.className = 'station-meta';

                if (isSearch) {
                    const lineBadge = document.createElement('span');
                    lineBadge.className = 'line-badge';
                    lineBadge.textContent = getLineShort(line.lineName);
                    lineBadge.style.backgroundColor = line.lineColor;
                    if (line.lineCode === '5号线' || line.lineCode === 'S9号线') {
                        lineBadge.style.color = '#333';
                    }
                    metaWrap.appendChild(lineBadge);
                }

                if (station.transferLines && station.transferLines.length > 0) {
                    station.transferLines.forEach(transferLine => {
                        if (transferLine === line.lineName) return;
                        const tag = document.createElement('span');
                        tag.className = 'transfer-tag';
                        tag.textContent = getLineShort(transferLine);
                        tag.style.backgroundColor = lineColorMap[transferLine];
                        metaWrap.appendChild(tag);
                    });
                }

                stationItem.appendChild(metaWrap);
                stationItem.onclick = () => confirmStation(station.name);
                stationList.appendChild(stationItem);
            });
            stationList.scrollTop = 0;
        }

        function updateButtons() {
            const startText = selection.start || '请选择起点站';
            const endText = selection.end || '请选择终点站';
            homeStartBtn.textContent = startText;
            resultStartBtn.textContent = startText;
            homeEndBtn.textContent = endText;
            resultEndBtn.textContent = endText;
        }

        function showHomeView() {
            homeView.classList.remove('hidden');
            resultView.classList.add('hidden');
        }

        function showResultView(needHeaderAnimation) {
            homeView.classList.add('hidden');
            resultView.classList.remove('hidden');
            if (!needHeaderAnimation) return;
            resultView.classList.add('is-entering');
            window.requestAnimationFrame(() => {
                window.requestAnimationFrame(() => {
                    resultView.classList.remove('is-entering');
                });
            });
        }

        function calcLastTimes(allPaths) {
            function pickByDay(dayType) {
                let best = null;
                allPaths.forEach(path => {
                    const depart = calcPathLastTime(path, dayType);
                    if (depart === null) return;
                    const arrive = depart + path.totalTime;
                    if (!best || depart > best.depart || (depart === best.depart && arrive > best.arrive)) {
                        best = { path, depart, arrive };
                    }
                });
                return best;
            }

            return {
                weekday: pickByDay('weekday'),
                weekend: pickByDay('weekend')
            };
        }

        function pickBestLastPath(allPaths, lastTimes) {
            const candidates = [lastTimes.weekday, lastTimes.weekend].filter(Boolean);
            if (candidates.length === 0) return allPaths[0];
            candidates.sort((a, b) => {
                if (a.depart !== b.depart) return b.depart - a.depart;
                return b.arrive - a.arrive;
            });
            return candidates[0].path;
        }

        function updateArrivalClocks() {
            const arriveNodes = resultCards.querySelectorAll('.path-arrive-time[data-duration]');
            if (arriveNodes.length === 0) return;
            const now = Date.now();
            arriveNodes.forEach(node => {
                const duration = Number(node.dataset.duration);
                if (Number.isNaN(duration)) return;
                const arriveTime = new Date(now + duration * 60000);
                node.textContent = `${formatClockMinute(arriveTime)}到达`;
            });
        }

        function startArrivalTicker() {
            if (arriveClockTimer !== null) return;
            arriveClockTimer = window.setInterval(updateArrivalClocks, 1000);
        }

        function runCardEntryAnimation() {
            const cards = Array.from(resultCards.querySelectorAll('.plan-card'));
            if (cards.length === 0) return;
            cards.forEach((card, index) => {
                card.classList.add('card-enter');
                card.style.transitionDelay = `${Math.min(index * 40, 120)}ms`;
            });
            window.requestAnimationFrame(() => {
                cards.forEach(card => card.classList.add('card-enter-active'));
            });
            window.setTimeout(() => {
                cards.forEach(card => {
                    card.classList.remove('card-enter', 'card-enter-active');
                    card.style.transitionDelay = '';
                });
            }, 560);
        }

        function setCardsContent(cardsHtml, animate) {
            if (cardsSwapTimer !== null) {
                window.clearTimeout(cardsSwapTimer);
                cardsSwapTimer = null;
            }

            const currentCards = Array.from(resultCards.querySelectorAll('.plan-card'));
            if (animate && currentCards.length > 0) {
                currentCards.forEach(card => card.classList.add('card-exit'));
                cardsSwapTimer = window.setTimeout(() => {
                    resultCards.innerHTML = cardsHtml;
                    runCardEntryAnimation();
                    updateArrivalClocks();
                }, 400);
                return;
            }

            resultCards.innerHTML = cardsHtml;
            if (animate) {
                runCardEntryAnimation();
            }
            updateArrivalClocks();
        }

        function buildLastGrid(lastTimes) {
            if (!lastTimes) return '';
            const weekday = lastTimes.weekday;
            const weekend = lastTimes.weekend;
            const weekdayText = weekday ? minutesToTime(weekday.depart) : '--:--';
            const weekendText = weekend ? minutesToTime(weekend.depart) : '--:--';
            const isUnified = weekday && weekend && weekday.depart === weekend.depart;

            if (isUnified) {
                return `
                    <div class="last-panel single">
                        <div class="last-panel-label">最晚上车时间</div>
                        <div class="last-panel-values">
                            <div class="last-slot">
                                <div class="last-slot-value">${weekdayText}</div>
                            </div>
                        </div>
                    </div>
                `;
            }

            return `
                <div class="last-panel">
                    <div class="last-panel-label">最晚上车时间</div>
                    <div class="last-panel-values">
                        <div class="last-slot">
                            <div class="last-slot-label">周日至周四</div>
                            <div class="last-slot-value">${weekdayText}</div>
                        </div>
                        <div class="last-slot">
                            <div class="last-slot-label">周五至周六</div>
                            <div class="last-slot-value">${weekendText}</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function buildPlanCard(config) {
            const iconsHtml = config.icons.map(icon => `<i class="${icon}"></i>`).join('');
            const durationText = formatDuration(config.path.totalTime);
            const shouldHideLastPath = Boolean(config.isLast && config.hideLastPath);
            const pathHtml = shouldHideLastPath
                ? ''
                : buildPathVisual(config.path, { showArrival: !config.isLast });
            const lastHtml = config.isLast ? buildLastGrid(config.lastTimes) : '';
            const shouldHideDuration = Boolean(config.isLast && config.hideDuration);
            const durationHtml = shouldHideDuration ? '' : `<div class="metric-duration">${durationText}</div>`;
            const bodyHtml = config.isLast ? `${lastHtml}${pathHtml}` : `${pathHtml}${lastHtml}`;
            return `
                <div class="plan-card">
                    <div class="plan-header">
                        <div class="plan-title">${iconsHtml}<span>${config.title}</span></div>
                        ${durationHtml}
                    </div>
                    ${bodyHtml}
                </div>
            `;
        }

        function isSameRoute(pathA, pathB) {
            if (!pathA || !pathB || !Array.isArray(pathA.segments) || !Array.isArray(pathB.segments)) return false;
            if (pathA.segments.length !== pathB.segments.length) return false;
            for (let i = 0; i < pathA.segments.length; i++) {
                const a = pathA.segments[i];
                const b = pathB.segments[i];
                if (!a || !b) return false;
                if (a.line !== b.line || a.start !== b.start || a.end !== b.end) {
                    return false;
                }
            }
            return true;
        }

        function renderResults(animate = true) {
            const startStation = selection.start;
            const endStation = selection.end;
            if (!startStation || !endStation) return;
            if (startStation === endStation) {
                alert('起点站和终点站不能相同');
                return;
            }

            const timePath = calcOptimalPath(startStation, endStation, 'time');
            const allPaths = calcOptimalPath(startStation, endStation, 'last');

            if (!timePath || !allPaths || allPaths.length === 0) {
                alert('未找到可行路径');
                return;
            }

            const lastTimes = calcLastTimes(allPaths);
            const lastPath = pickBestLastPath(allPaths, lastTimes);
            const sameRoute = isSameRoute(timePath, lastPath);
            const cards = [
                buildPlanCard({
                    title: '时间最短',
                    icons: ['fa-solid fa-bolt'],
                    path: timePath
                }),
                buildPlanCard({
                    title: '末班最晚',
                    icons: ['fa-regular fa-moon'],
                    path: lastPath,
                    isLast: true,
                    lastTimes,
                    hideLastPath: sameRoute,
                    hideDuration: sameRoute
                })
            ];

            setCardsContent(cards.join(''), animate);
        }

        // ===================== 7. 交互逻辑 =====================
        function openPicker(target) {
            currentTarget = target;
            stationSearch.value = '';
            overlay.classList.add('active');
            picker.classList.add('active');
            renderStations();
        }

        function closeModal() {
            overlay.classList.remove('active');
            picker.classList.remove('active');
        }

        function showResultsAfterSelection() {
            const firstTransition = !hasHeaderMovedToTop;
            showResultView(firstTransition);
            renderResults(true);
            hasHeaderMovedToTop = true;
        }

        function confirmStation(stationName) {
            if (currentTarget === 'start' && selection.end === stationName) {
                alert('起点站和终点站不能相同');
                return;
            }
            if (currentTarget === 'end' && selection.start === stationName) {
                alert('起点站和终点站不能相同');
                return;
            }
            selection[currentTarget] = stationName;
            updateButtons();
            closeModal();
            if (selection.start && selection.end) {
                showResultsAfterSelection();
            } else {
                showHomeView();
            }
        }

        function swapStations() {
            const temp = selection.start;
            selection.start = selection.end;
            selection.end = temp;
            updateButtons();

            if (selection.start && selection.end) {
                showResultView(false);
                renderResults(true);
            } else {
                showHomeView();
            }
        }

        // ===================== 8. 通用水波纹动效 =====================
        function parseRgbColor(value) {
            if (!value) return null;
            const matched = value.match(/rgba?\(([^)]+)\)/i);
            if (!matched) return null;
            const nums = matched[1].split(',').map(item => Number(item.trim()));
            if (nums.length < 3 || nums.slice(0, 3).some(Number.isNaN)) return null;
            return nums.slice(0, 3);
        }

        function getRippleColor(element) {
            const styles = window.getComputedStyle(element);
            const customColor = styles.getPropertyValue('--ripple-color').trim();
            if (customColor) return customColor;

            const bgRgb = parseRgbColor(styles.backgroundColor);
            if (bgRgb && styles.backgroundColor !== 'rgba(0, 0, 0, 0)') {
                return `rgba(${bgRgb[0]}, ${bgRgb[1]}, ${bgRgb[2]}, 0.22)`;
            }

            const textRgb = parseRgbColor(styles.color);
            if (textRgb) {
                return `rgba(${textRgb[0]}, ${textRgb[1]}, ${textRgb[2]}, 0.22)`;
            }
            return 'rgba(10, 100, 201, 0.2)';
        }

        function createRipple(element, clientX, clientY) {
            const rect = element.getBoundingClientRect();
            if (rect.width === 0 || rect.height === 0) return;
            const size = Math.max(rect.width, rect.height) * 2;
            const wave = document.createElement('span');
            wave.className = 'ripple-wave';
            wave.style.width = `${size}px`;
            wave.style.height = `${size}px`;
            wave.style.left = `${clientX - rect.left}px`;
            wave.style.top = `${clientY - rect.top}px`;
            wave.style.backgroundColor = getRippleColor(element);
            element.appendChild(wave);
            wave.addEventListener('animationend', () => wave.remove(), { once: true });
        }

        // ===================== 9. 事件绑定 =====================
        homeStartBtn.addEventListener('click', () => openPicker('start'));
        homeEndBtn.addEventListener('click', () => openPicker('end'));
        resultStartBtn.addEventListener('click', () => openPicker('start'));
        resultEndBtn.addEventListener('click', () => openPicker('end'));
        homeSwapBtn.addEventListener('click', swapStations);
        resultSwapBtn.addEventListener('click', swapStations);

        overlay.addEventListener('click', closeModal);
        clearSearch.addEventListener('click', () => {
            stationSearch.value = '';
            renderStations();
        });
        stationSearch.addEventListener('input', renderStations);

        document.addEventListener('pointerdown', event => {
            if (event.button !== 0) return;
            const target = event.target.closest('[data-ripple="true"]');
            if (!target) return;
            createRipple(target, event.clientX, event.clientY);
        });

        // ===================== 10. 页面初始化 =====================
        normalizeTransferLines();
        initGraph();
        renderLines();
        renderStations();
        updateButtons();
        startArrivalTicker();
        showHomeView();
    </script>
</body>
</html>
